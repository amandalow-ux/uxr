<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>UXR Prototypes</title>
  <style>
    :root { color-scheme: light dark; }
    * { box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      max-width: 640px;
      margin: 0 auto;
      padding: 64px 24px;
      line-height: 1.5;
    }
    h1 { font-size: 28px; margin: 0 0 8px; }
    .sub { color: #666; margin: 0 0 32px; }
    ul { list-style: none; padding: 0; margin: 0; }
    li { margin-bottom: 12px; }
    a {
      display: block;
      padding: 16px 20px;
      border: 1px solid #ddd;
      border-radius: 8px;
      text-decoration: none;
      color: inherit;
      transition: border-color 0.15s, background 0.15s;
    }
    a:hover { border-color: #888; background: rgba(0,0,0,0.02); }
    .name { font-weight: 600; font-size: 16px; }
    .desc { color: #666; font-size: 14px; margin-top: 4px; }
    @media (prefers-color-scheme: dark) {
      body { background: #111; color: #eee; }
      .sub, .desc { color: #999; }
      a { border-color: #333; }
      a:hover { border-color: #666; background: rgba(255,255,255,0.04); }
    }
  </style>
</head>
<body>
  <h1>UXR Prototypes</h1>
  <p class="sub">UX research prototypes</p>
  <ul>
    <li>
      <a href="premium-banner-control/">
        <div class="name">Premium banner — control</div>
        <div class="desc">Control variant of the premium experience banner</div>
      </a>
    </li>
    <li>
      <a href="premium-banner-v1/">
        <div class="name">Premium banner — v1 (date night)</div>
        <div class="desc">v1 iteration with date night theme</div>
      </a>
    </li>
  </ul>
</body>
</html>
